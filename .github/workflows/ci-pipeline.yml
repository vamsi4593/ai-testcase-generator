on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: aitcgenerator1
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository code
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: upgrade pip
        run: python -m pip install --upgrade pip

      - name: installing project requirements
        run: pip install -r requirements.txt

      - name: installing lint tools
        run : pip install ruff black

      - name: Run Ruff Check
        run: ruff check .

      - name: Run Black
        run: black --check .